version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: process-monitor-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: process_monitor_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - process-monitor-dev-network

  # Redis for Queue Management
  redis:
    image: redis:7-alpine
    container_name: process-monitor-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - process-monitor-dev-network

  # BullMQ Board for monitoring queues
  bullmq-board:
    image: deadly0/bull-board
    container_name: process-monitor-bullboard-dev
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3001:3000"
    depends_on:
      - redis
    networks:
      - process-monitor-dev-network

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local

networks:
  process-monitor-dev-network:
    driver: bridge
